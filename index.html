<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="./favicon.png" />
  <title>Historical Retirement Simulator</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="page-shell">
    <header class="page-header">
      <h1>Historical Retirement Simulator</h1>
      <p>
        Retirement outcomes using a shared browser-based simulation engine with
        historical, Monte Carlo, and deterministic modes.
      </p>
    </header>

    <section class="card plan-card">
      <h2>Plan inputs</h2>

      <form id="planForm" novalidate>
        <div class="field-grid field-grid-2">
          <label class="field">
            <span class="field-label">Simulation mode</span>
            <select id="simulationMode" name="simulationMode">
              <option value="historical" selected>Historical (rolling windows)</option>
              <option value="montecarlo">Monte Carlo</option>
              <option value="deterministic">Deterministic</option>
            </select>
          </label>

          <label class="field">
            <span class="field-label">Simulation years</span>
            <input
              id="simulationYears"
              name="simulationYears"
              type="text"
              inputmode="numeric"
              value="30"
            />
          </label>
        </div>

        <div class="field-grid field-grid-3">
          <label class="field">
            <span class="field-label">Starting portfolio</span>
            <input
              id="startingPortfolio"
              name="startingPortfolio"
              type="text"
              inputmode="decimal"
              value="1000000"
            />
          </label>

          <label class="field">
            <span class="field-label">Annual spending</span>
            <input
              id="annualSpending"
              name="annualSpending"
              type="text"
              inputmode="decimal"
              value="40000"
            />
          </label>

          <label class="field">
            <span class="field-label">Annual fees (%)</span>
            <input
              id="annualFees"
              name="annualFees"
              type="text"
              inputmode="decimal"
              value="0.20"
            />
          </label>
        </div>

        <div class="card section-card">
          <h3>Allocation</h3>

          <div class="field-grid field-grid-3">
            <label class="field">
              <span class="field-label">Equities (%)</span>
              <input
                id="equityAllocation"
                name="equityAllocation"
                type="text"
                inputmode="decimal"
                value="60"
              />
            </label>

            <label class="field">
              <span class="field-label">Bonds (%)</span>
              <input
                id="bondAllocation"
                name="bondAllocation"
                type="text"
                inputmode="decimal"
                value="40"
              />
            </label>

            <label class="field">
              <span class="field-label">Cash-like (%)</span>
              <input
                id="cashAllocation"
                name="cashAllocation"
                type="text"
                inputmode="decimal"
                value="0"
              />
            </label>
          </div>

          <label class="field field-checkbox">
            <input
              id="rebalance"
              name="rebalance"
              type="checkbox"
              checked
            />
            <span>Rebalance annually to target allocation</span>
          </label>
        </div>

        <div class="card section-card">
          <h3>State pension</h3>

          <div class="field-grid field-grid-3">
            <label class="field">
              <span class="field-label">Full state pension today value</span>
              <input
                id="statePensionToday"
                name="statePensionToday"
                type="text"
                inputmode="decimal"
                value="11500"
              />
            </label>

            <label class="field">
              <span class="field-label">State pension start age</span>
              <input
                id="statePensionStartAge"
                name="statePensionStartAge"
                type="text"
                inputmode="numeric"
                value="67"
              />
            </label>

            <label class="field">
              <span class="field-label">Spending basis</span>
              <select id="spendingBasis" name="spendingBasis">
                <option value="real" selected>Real</option>
                <option value="nominal">Nominal</option>
              </select>
            </label>
          </div>

          <div class="field-grid field-grid-2">
            <label class="field field-checkbox">
              <input
                id="includeStatePension"
                name="includeStatePension"
                type="checkbox"
              />
              <span>Include state pension income</span>
            </label>

            <label class="field">
              <span class="field-label">Display values</span>
              <select id="displayValues" name="displayValues">
                <option value="real" selected>Real</option>
                <option value="nominal">Nominal</option>
              </select>
            </label>
          </div>
        </div>

        <div class="card section-card">
          <h3>Guardrails</h3>

          <label class="field field-checkbox">
            <input
              id="useGuardrails"
              name="useGuardrails"
              type="checkbox"
            />
            <span>Enable guardrails spending rules</span>
          </label>

          <div class="field-grid field-grid-4">
            <label class="field">
              <span class="field-label">Floor (%)</span>
              <input
                id="guardrailFloor"
                name="guardrailFloor"
                type="text"
                inputmode="decimal"
                value="0"
              />
            </label>

            <label class="field">
              <span class="field-label">Ceiling (%)</span>
              <input
                id="guardrailCeiling"
                name="guardrailCeiling"
                type="text"
                inputmode="decimal"
                value="0"
              />
            </label>

            <label class="field">
              <span class="field-label">Cut (%)</span>
              <input
                id="guardrailCut"
                name="guardrailCut"
                type="text"
                inputmode="decimal"
                value="0"
              />
            </label>

            <label class="field">
              <span class="field-label">Raise (%)</span>
              <input
                id="guardrailRaise"
                name="guardrailRaise"
                type="text"
                inputmode="decimal"
                value="0"
              />
            </label>
          </div>
        </div>

        <div class="card section-card">
          <h3>Monte Carlo assumptions</h3>

          <div class="field-grid field-grid-3">
            <label class="field">
              <span class="field-label">Runs</span>
              <input
                id="monteCarloRuns"
                name="monteCarloRuns"
                type="text"
                inputmode="numeric"
                value="1000"
              />
            </label>

            <label class="field">
              <span class="field-label">Equity mean return (%)</span>
              <input
                id="equityReturnMean"
                name="equityReturnMean"
                type="text"
                inputmode="decimal"
                value="7"
              />
            </label>

            <label class="field">
              <span class="field-label">Equity volatility (%)</span>
              <input
                id="equityReturnStdDev"
                name="equityReturnStdDev"
                type="text"
                inputmode="decimal"
                value="15"
              />
            </label>
          </div>

          <div class="field-grid field-grid-3">
            <label class="field">
              <span class="field-label">Bond mean return (%)</span>
              <input
                id="bondReturnMean"
                name="bondReturnMean"
                type="text"
                inputmode="decimal"
                value="2"
              />
            </label>

            <label class="field">
              <span class="field-label">Bond volatility (%)</span>
              <input
                id="bondReturnStdDev"
                name="bondReturnStdDev"
                type="text"
                inputmode="decimal"
                value="7"
              />
            </label>

            <label class="field">
              <span class="field-label">Inflation mean (%)</span>
              <input
                id="inflationMean"
                name="inflationMean"
                type="text"
                inputmode="decimal"
                value="2.5"
              />
            </label>
          </div>

          <div class="field-grid field-grid-3">
            <label class="field">
              <span class="field-label">Inflation volatility (%)</span>
              <input
                id="inflationStdDev"
                name="inflationStdDev"
                type="text"
                inputmode="decimal"
                value="2"
              />
            </label>
          </div>
        </div>

        <div class="card section-card">
          <h3>Deterministic assumptions</h3>

          <div class="field-grid field-grid-3">
            <label class="field">
              <span class="field-label">Equity return (%)</span>
              <input
                id="equityReturn"
                name="equityReturn"
                type="text"
                inputmode="decimal"
                value="6"
              />
            </label>

            <label class="field">
              <span class="field-label">Bond return (%)</span>
              <input
                id="bondReturn"
                name="bondReturn"
                type="text"
                inputmode="decimal"
                value="2"
              />
            </label>

            <label class="field">
              <span class="field-label">Inflation (%)</span>
              <input
                id="inflation"
                name="inflation"
                type="text"
                inputmode="decimal"
                value="2"
              />
            </label>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit">Run simulation</button>
        </div>
      </form>
    </section>

    <section id="resultsSummary" aria-live="polite"></section>
    <section id="historicalChart" aria-live="polite"></section>
    <section id="scenarioTable" aria-live="polite"></section>
  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
